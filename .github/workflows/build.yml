name: Build Geode Mod

on:
  workflow_dispatch: # Позволяет запускать сборку вручную из интерфей��а GitHub
  push:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

    name: Build for ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Build Mod
      uses: geode-sdk/build-geode-mod@main
      with:
        bindings: geode-sdk/bindings
        bindings-ref: main
        cli: v3.7.4 # Версия Geode CLI

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GeodeMacroBot-${{ matrix.config.name }}
        path: ${{ github.workspace }}/build/*.geode